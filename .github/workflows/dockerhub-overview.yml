name: Sync Docker Hub overview

# Pushes docs/DOCKERHUB.md to the casualoffice/sheets Docker Hub "Repository
# overview" WITHOUT rebuilding/publishing an image. The image publish workflow
# (docker-publish.yml) also syncs it on every release, but that only fires on a
# tag — this lets us refresh the overview on its own:
#   • automatically when docs/DOCKERHUB.md changes on main, and
#   • on demand via the Actions "Run workflow" button.
#
# AUTH NOTE: this uses the same `DOCKERHUB_TOKEN` credential as the image push
# (matching the docs repo's release.yml). That token must have write access to
# the repository's Docker Hub metadata for the description PATCH to succeed.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - docs/DOCKERHUB.md
      - .github/workflows/dockerhub-overview.yml

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Push overview to Docker Hub
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: casualoffice/sheets
          short-description: 'Excel-flavored web spreadsheet with real-time co-editing. Single image (web + Hocuspocus + Fastify). Apache-2.0.'
          readme-filepath: ./docs/DOCKERHUB.md
