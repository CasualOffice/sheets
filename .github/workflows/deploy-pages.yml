name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; cancel any in-progress run when a
# new push arrives so we always publish the latest main.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # No `version:` — it's picked from `packageManager` in package.json
        # (pnpm@10.33.4), avoiding ERR_PNPM_BAD_PM_VERSION.
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck web
        run: pnpm --filter @sheet/web typecheck

      - name: Build web
        env:
          # Sheet app is served from /sheets/ on every URL it lives at:
          #   schnsrw.live/sheets/             (custom domain, primary)
          #   schnsrw.github.io/sheets/        (GitHub-provided URL)
          # so asset paths are baked with that prefix.
          PAGES_BASE: /sheets/
        run: pnpm --filter @sheet/web build

      - name: Assemble combined Pages artifact
        # One Pages site serves both surfaces from the apex of the custom
        # domain:
        #   /              → apex landing page (site/)
        #   /sheets/       → sheet app          (apps/web/dist/)
        # The CNAME at the artifact root tells GitHub Pages which host to
        # serve. Without it in every deploy the custom-domain config in the
        # Pages UI gets silently dropped.
        run: |
          set -euo pipefail
          mkdir -p public/sheets
          cp -R site/. public/
          cp -R apps/web/dist/. public/sheets/
          echo "schnsrw.live" > public/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
