<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Casual Sheets">
  <title>Casual Sheets</title>
  <defs>
    <linearGradient id="cs-tile" x1="6" y1="4" x2="42" y2="44" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1aa3c4"/>
      <stop offset="1" stop-color="#0a5266"/>
    </linearGradient>
  </defs>
  <!-- Rounded teal-gradient app tile (the brand surface). -->
  <rect x="3" y="3" width="42" height="42" rx="12" fill="url(#cs-tile)"/>
  <!-- Top-lit highlight along the title-bar curve. -->
  <path d="M3 15C3 8.373 8.373 3 15 3H33C39.627 3 45 8.373 45 15V18H3V15Z" fill="#ffffff" fill-opacity="0.12"/>
  <!-- 2×2 cell grid, with the bottom-right reading as the "active" cell. -->
  <rect x="13" y="13" width="10" height="10" rx="2.5" fill="#ffffff" fill-opacity="0.5"/>
  <rect x="25" y="13" width="10" height="10" rx="2.5" fill="#ffffff" fill-opacity="0.5"/>
  <rect x="13" y="25" width="10" height="10" rx="2.5" fill="#ffffff" fill-opacity="0.4"/>
  <rect x="25" y="25" width="10" height="10" rx="2.5" fill="#ffffff"/>
</svg>
